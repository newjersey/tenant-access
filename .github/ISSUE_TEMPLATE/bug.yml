name: Bug Report
description: File a bug report.
title: "[Bug]: "
labels: ["bug", "triage"]
type: bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: General overview of what happened and where it happened
      placeholder: I was trying to do X, but instead Y happened. This was on the Z page.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: What steps did you take to reproduce the bug? Please be as detailed as possible.
      placeholder: 1. Do this. 2. Do that. 3. See the bug.
    validations:
      required: true
  - type: textarea
    id: desired-behavior
    attributes:
      label: Desired behavior
      description: What *should* have happened?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description:
        What is/are the requirements for fixing the bug? Please be as detailed as possible.
      placeholder: 1. Do this. 2. Do that. 3. See the expected behavior.
    validations:
      required: true
  - type: dropdown
    id: browsers
    attributes:
      label: What browsers are you seeing the problem on?
      multiple: true
      options:
        - Firefox
        - Chrome
        - Safari
        - Microsoft Edge
        - Android browser
